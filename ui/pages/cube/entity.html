<section class="cube-entity-page">
  <div class="cube-dashboard-strip">
    <div class="cube-stat-card">
      <span>当前功能</span>
      <strong id="cube-table-title">请选择实体</strong>
    </div>
    <div class="cube-stat-card">
      <span>Doris 数据表</span>
      <strong id="cube-table-meta">—</strong>
    </div>
    <div class="cube-stat-card">
      <span>编辑状态</span>
      <strong id="cube-editor-state">未选择</strong>
    </div>
  </div>

  <section class="card glow-card cube-enum-collector" id="cube-enum-collector" style="display:none">
      <div class="card-header">
      <span class="card-title">枚举采集范围</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm btn-secondary" onclick="loadCubeEnumOptions()">刷新候选</button>
        <button class="btn btn-sm btn-secondary" onclick="setCubeEnumRecommended()">推荐项</button>
        <button class="btn btn-sm btn-primary" onclick="collectCubeEnums()">采集勾选项</button>
      </div>
    </div>
    <div class="card-body">
      <div class="form-hint" style="margin-bottom:10px">
        只建议采集低基数、稳定、会被用户自然语言提到的维度。订单、用户、退款等明细 Cube 默认不建议采集。
      </div>
      <div class="cube-enum-toolbar">
        <label class="form-label">单维度最大值</label>
        <input class="form-input" id="cube-enum-max-values" type="number" value="200" min="1" max="1000">
        <label class="form-label">最大基数</label>
        <input class="form-input" id="cube-enum-max-cardinality" type="number" value="500" min="1" max="5000">
      </div>
      <div class="cube-enum-options" id="cube-enum-options">
        <div class="empty-text">正在加载可采集维度…</div>
      </div>
      <div class="form-hint" id="cube-enum-msg"></div>
    </div>
  </section>

  <section class="cube-editor-layout">
    <div class="card glow-card cube-table-card">
      <div class="card-header">
        <span class="card-title">数据列表</span>
        <button class="btn btn-sm btn-secondary" onclick="loadCubeRows()">刷新</button>
        <button class="btn btn-sm btn-primary" onclick="newCubeRow()">新增</button>
        <button class="btn btn-sm btn-secondary" onclick="syncCubeCache()">同步缓存</button>
      </div>
      <div class="cube-table-wrap">
        <table>
          <thead id="cube-thead"></thead>
          <tbody id="cube-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="card glow-card cube-editor-card">
      <div class="card-header">
        <span class="card-title">JSON 编辑器</span>
      </div>
      <div class="card-body">
        <textarea class="form-input form-textarea" id="cube-row-json"></textarea>
        <div class="cube-editor-actions">
          <button class="btn btn-primary" onclick="saveCubeRow()">保存</button>
          <button class="btn btn-danger" onclick="deleteCubeRow()">删除</button>
          <button class="btn btn-secondary" onclick="formatCubeJson()">格式化</button>
        </div>
        <div class="form-hint" id="cube-admin-msg">修改保存后，点击“同步缓存”即可加载到 Cube 内存。</div>
      </div>
    </div>
  </section>
</section>
