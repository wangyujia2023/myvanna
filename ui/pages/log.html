<div class="page" id="page-log">
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="panel-header" style="padding:12px 16px;flex-shrink:0">
      <span class="panel-title">📋 调用日志</span>
      <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
        <span id="log-stats" style="font-size:12px;color:var(--text3)"></span>
        <button class="btn btn-secondary btn-sm" onclick="loadLogs()">🔄 刷新</button>
      </div>
    </div>
    <div class="log-body">
      <div class="log-list" id="log-list"></div>
      <div class="log-detail" id="log-detail">
        <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">点击左侧记录查看详情</div></div>
      </div>
    </div>
  </div>
</div>
