<div class="tab-pane" id="pane-mine">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:700px">
          <div class="card">
            <div class="card-header"><span class="card-title">⛏ 挖掘 audit_log</span></div>
            <div class="card-body">
              <div class="form-group" style="margin-bottom:10px">
                <label class="form-label">最大查询时间 (ms)</label>
                <input class="form-input" type="number" id="mine-ms" value="30000">
              </div>
              <div class="form-group" style="margin-bottom:12px">
                <label class="form-label">最多挖掘条数</label>
                <input class="form-input" type="number" id="mine-limit" value="500">
              </div>
              <button class="btn btn-primary" onclick="doMine()" id="btn-mine" style="width:100%">🚀 开始挖掘</button>
              <div id="mine-result" style="margin-top:12px;font-size:12px;color:var(--text2)"></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><span class="card-title">ℹ️ 说明</span></div>
            <div class="card-body" style="font-size:12.5px;line-height:1.8;color:var(--text2)">
              <p>挖掘流程：</p>
              <p>1. 从 <code>__internal_schema.audit_log</code> 提取成功的 SELECT 查询</p>
              <p>2. 质量过滤：执行成功 · 时间合理 · 有返回结果 · 非系统查询</p>
              <p>3. 去重处理</p>
              <p>4. 用 Qwen 反向生成对应的「中文问题」</p>
              <p>5. 写入向量知识库</p>
              <hr class="divider" style="margin:8px 0">
              <p style="color:var(--yellow)">⚠️ 开启 Qwen 反推问题较慢，每条约 1~3 秒</p>
            </div>
          </div>
        </div>
      </div>
