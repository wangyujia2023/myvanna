<div class="tab-pane active">
  <div class="card">
    <div class="card-header">
      <span class="card-title">🧪 语义回归测试</span>
    </div>
    <div class="card-body">
      <div class="form-hint" style="margin-bottom:12px">
        每行一个问题，点击后会按当前右上角引擎逐条执行。结果会展示完整 SQL、关键步骤和原始 Trace JSON，方便直接复制给大模型分析。
      </div>

      <div class="form-group">
        <label class="form-label">批量问题</label>
        <textarea
          class="form-input form-textarea"
          id="regression-questions"
          style="min-height:180px;font-family:var(--mono)"
          placeholder="每行一个问题，例如：&#10;4月份各城市销售额是多少？&#10;昨日各城市销售额环比增长多少？&#10;PLUS会员和普通会员消费对比？"></textarea>
      </div>

      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" id="btn-run-regression" onclick="runRegressionBatch()">▶ 开始回归</button>
        <button class="btn btn-secondary" onclick="fillRegressionSamples()">✨ 填充示例</button>
        <button class="btn btn-secondary" onclick="copyRegressionReport()" id="btn-copy-regression-all" disabled>📋 复制全部报告</button>
        <span class="form-hint" id="regression-status"></span>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:12px">
    <div class="card-header">
      <span class="card-title">📚 执行结果</span>
      <span class="form-hint" id="regression-summary">尚未执行</span>
    </div>
    <div class="card-body" id="regression-results">
      <div class="empty-state">
        <div class="empty-icon">🧪</div>
        <div class="empty-text">粘贴多条问题后开始回归</div>
      </div>
    </div>
  </div>
</div>
