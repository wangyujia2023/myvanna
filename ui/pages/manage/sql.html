<div class="tab-pane active" id="pane-sql">
        <div class="filter-bar">
          <input class="form-input" id="sql-filter-search" placeholder="搜索问题/SQL…"
            oninput="filterSqlTable()" style="width:240px">
          <button class="btn btn-secondary" onclick="loadSqlSources()">🔄 刷新</button>
          <span id="sql-count" style="font-size:12px;color:var(--text3);margin-left:auto"></span>
        </div>
        <div class="card">
          <div class="card-body">
            <div class="form-group" style="margin-bottom:10px">
              <label class="form-label">自然语言问题</label>
              <textarea class="form-input form-textarea" id="add-q" placeholder="上个月各大区销售额？"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:12px">
              <label class="form-label">对应 SQL</label>
              <textarea class="form-input form-textarea" id="add-sql" placeholder="SELECT ..." style="min-height:100px;font-family:var(--mono)"></textarea>
            </div>
            <button class="btn btn-primary" onclick="addQA()">✅ 添加 SQL 样本</button>
          </div>
        </div>
        <div class="result-table-wrap">
          <div class="table-scroll" style="max-height:calc(100vh - 260px)">
            <table>
              <thead>
                <tr>
                  <th>ID</th><th>来源</th><th>问题</th>
                  <th>内容预览</th><th>命中</th><th>质量</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="sql-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
