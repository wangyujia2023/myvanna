<div class="page active" id="page-rca-regression">
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="card">
      <div class="card-header">
        <span class="card-title">⌬ 归因回归</span>
      </div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">批量归因问题</label>
          <textarea
            class="form-input form-textarea"
            id="regression-questions"
            style="min-height:180px;font-family:var(--mono)"
            placeholder="每行一个归因问题，例如：&#10;上个月 GMV 下降的主要原因是什么？&#10;高价值用户流失风险与消费异动深度归因分析&#10;昨日各城市销售额异动原因是什么？"></textarea>
        </div>

        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <button class="btn btn-primary" id="btn-run-regression" onclick="runRegressionBatch('rca')">▶ 开始归因回归</button>
          <button class="btn btn-secondary" onclick="fillRegressionSamples('rca')">✨ 填充示例</button>
          <button class="btn btn-secondary" onclick="copyRegressionReport()" id="btn-copy-regression-all" disabled>📋 复制全部报告</button>
          <span class="form-hint" id="regression-status"></span>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;flex:1;min-height:0">
      <div class="card-header">
        <span class="card-title">📚 执行结果</span>
        <span class="form-hint" id="regression-summary">尚未执行</span>
      </div>
      <div class="card-body regression-results" id="regression-results">
        <div class="empty-state">
          <div class="empty-icon">⌬</div>
          <div class="empty-text">粘贴多条归因问题后开始回归</div>
        </div>
      </div>
    </div>
  </div>
</div>
