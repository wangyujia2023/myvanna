const Ic=({name,size=16,color=C.t2,style={}})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
    strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={style}>
    <path d={ICONS[name]}/>
  </svg>
);

// ─── Chart Components ─────────────────────────────────────────
const GlowLine=({data,color=C.acc,height=120,showDots=false})=>{
  const W=300,H=100;
  const max=Math.max(...data),min=Math.min(...data);
  const py=v=>H-((v-min)/(max-min||1))*(H-16)-8;
  const px=(_,i)=>i*(W/(data.length-1));
  const pts=data.map((v,i)=>[px(null,i),py(v)]);
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area=`${line} L${pts[pts.length-1][0]},${H} L0,${H} Z`;
  const uid=color.replace(/[^\w]/g,'');
  return(
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height,display:'block'}}>
      <defs>
        <linearGradient id={`lg${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
        <filter id={`gf${uid}`}>
          <feGaussianBlur stdDeviation="2.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d={area} fill={`url(#lg${uid})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="2.2" filter={`url(#gf${uid})`} strokeLinejoin="round"/>
      {showDots&&pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill={color} filter={`url(#gf${uid})`}/>)}
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3.5" fill={color} filter={`url(#gf${uid})`}/>
    </svg>
  );
};

const GlowBars=({data,labels,colors,height=130})=>{
  const max=Math.max(...data.map(Math.abs));
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:5,height,paddingBottom:labels?18:4}}>
      {data.map((v,i)=>{
        const col=colors?colors[i]:C.acc;
        return(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,height:'100%',justifyContent:'flex-end'}}>
            <div style={{
              width:'100%',height:`${(Math.abs(v)/max)*82}%`,
              background:`linear-gradient(to top,${col},${col}cc)`,
              borderRadius:'3px 3px 0 0',
              boxShadow:`0 0 12px ${col}55`,
              transition:'height 0.6s cubic-bezier(.22,1,.36,1)',
              position:'relative',
            }}>
              <span style={{position:'absolute',top:-16,left:'50%',transform:'translateX(-50%)',fontSize:9,color:col,fontWeight:700,whiteSpace:'nowrap'}}>{v}{typeof v==='number'&&v<200?'%':''}</span>
            </div>
            {labels&&<span style={{fontSize:9,color:C.t3,textAlign:'center',lineHeight:1.2,position:'absolute',bottom:0}}>{labels[i]}</span>}
          </div>
        );
      })}
    </div>
  );
};

const ScatterPlot=({pts,color=C.acc,height=150})=>{
  const W=300,H=120;
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const mx=Math.max(...xs),mn=Math.min(...xs),my=Math.max(...ys),mny=Math.min(...ys);
  const px=v=>((v-mn)/(mx-mn||1))*(W-24)+12;
  const py=v=>H-((v-mny)/(my-mny||1))*(H-20)-10;
  const n=pts.length,sx=xs.reduce((a,v)=>a+v,0),sy=ys.reduce((a,v)=>a+v,0);
  const sxy=pts.reduce((a,p)=>a+p[0]*p[1],0),sx2=xs.reduce((a,v)=>a+v*v,0);
  const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx||1),int=(sy-slope*sx)/n;
  const uid='scat';
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height,display:'block'}}>
      <defs>
        <filter id={`gfscat`}><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <line x1={px(mn)} y1={py(slope*mn+int)} x2={px(mx)} y2={py(slope*mx+int)}
        stroke={C.warn} strokeWidth="1.5" strokeDasharray="4,3" filter="url(#gfscat)"/>
      {pts.map((p,i)=>(
        <circle key={i} cx={px(p[0])} cy={py(p[1])} r="3.5" fill={color} opacity="0.72" filter="url(#gfscat)"/>
      ))}
    </svg>
  );
};

const WaterfallChart=({items,height=160})=>{
  const maxAbs=Math.max(...items.map(i=>Math.abs(i.value)));
  const W=items.length*52,H=90;
  const uid='wfall';
  return(
    <svg viewBox={`0 0 ${W} ${H+28}`} style={{width:'100%',height,display:'block'}}>
      <defs>
        <filter id="gfwfall"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <line x1="0" y1={H*0.5} x2={W} y2={H*0.5} stroke={C.border} strokeWidth="1"/>
      {items.map((item,i)=>{
        const pos=item.value>=0;
        const bh=Math.max((Math.abs(item.value)/maxAbs)*(H*0.45),4);
        const x=i*52+4,bw=44;
        const y=pos?H*0.5-bh:H*0.5;
        const col=i===0||i===items.length-1?C.acc:pos?C.ok:C.err;
        return(
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh} fill={col} opacity={0.85} rx="3" filter="url(#gfwfall)"/>
            <text x={x+bw/2} y={H+22} textAnchor="middle" fontSize="7.5" fill={C.t3}>{item.label}</text>
            <text x={x+bw/2} y={pos?y-5:y+bh+11} textAnchor="middle" fontSize="8.5" fill={col} fontWeight="700">
              {item.value>0?'+':''}{item.value}%
            </text>
          </g>
        );
      })}
    </svg>
  );
};

  success:{color:'#10B981',prefix:'✓',bold:false},
  error:  {color:'#F06060',prefix:'✗',bold:false},
  sql:    {color:'#22D3EE',prefix:'',bold:false},
  data:   {color:'#F59E0B',prefix:'↳',bold:false},
  warn:   {color:'#F59E0B',prefix:'⚠',bold:false},
};

const LogLine=({entry})=>{
  const st=LOG_STYLE[entry.type]||LOG_STYLE.info;
  if(entry.type==='sql') return(
    <div style={{marginBottom:8,animation:'fadeUp 0.2s ease forwards'}}>
      <span style={{fontFamily:'monospace',fontSize:10.5,color:'#4A6685'}}>[{entry.time}] </span>
      <span style={{fontFamily:'monospace',fontSize:10.5,color:C.cyan}}>✎ SQL 生成完毕</span>
      <pre style={{
        background:'#02070F',border:`1px solid ${C.cyan}28`,
        borderLeft:`3px solid ${C.cyan}66`,
        borderRadius:'0 6px 6px 0',padding:'9px 14px',
        margin:'6px 0 4px',color:C.cyan,fontSize:11,
        lineHeight:1.85,overflow:'auto',whiteSpace:'pre',
        fontFamily:"'Fira Code','Cascadia Code',monospace",
      }}>{entry.text}</pre>
    </div>
  );
  return(
    <div style={{
      fontFamily:'monospace',fontSize:11,lineHeight:1.7,
      marginBottom:2,color:st.color,
      fontWeight:st.bold?700:400,
      animation:'fadeUp 0.2s ease forwards',
    }}>
      <span style={{color:'#2A4060',userSelect:'none'}}>[{entry.time}]&nbsp;</span>
      <span style={{opacity:0.6}}>{st.prefix}&nbsp;</span>
      <span>{entry.text}</span>
    </div>
  );
};

const QueryPage=()=>{
  const[input,setInput]=useState('');
  const[state,setState]=useState('idle');
  const[logs,setLogs]=useState([]);
  const[result,setResult]=useState(null);
  const[tab,setTab]=useState('chart');
  const logRef=useRef();

  const ts=()=>new Date().toTimeString().slice(0,8);

  const buildSteps=(q)=>[
    {delay:60,   type:'step',    text:`开始执行 → "${q}"`},
    {delay:220,  type:'info',    text:'NLU 模型解析用户意图...'},
    {delay:700,  type:'success', text:`意图: 趋势分析  ·  指标: GMV  ·  粒度: 日  ·  时间范围: 近30天`},
    {delay:950,  type:'info',    text:'向 GPT-4o 发起 SQL 生成请求 (temperature=0.2)...'},
    {delay:1200, type:'sql',     text:`SELECT\n  date,\n  SUM(order_amount)      AS gmv,\n  COUNT(*)               AS orders,\n  COUNT(DISTINCT uid)    AS uv\nFROM orders\nWHERE\n  date >= DATEADD(day, -30, GETDATE())\n  AND status NOT IN ('cancelled', 'refunded')\nGROUP BY date\nORDER BY date ASC`},
    {delay:2000, type:'success', text:`SQL 生成完成  ·  用量: 318 tokens  ·  耗时: 0.82s`},
    {delay:2180, type:'info',    text:'路由到数据源: 生产 MySQL 8.0  (10.0.1.5:3306)...'},
    {delay:2400, type:'success', text:'连接成功  ·  RTT: 11ms  ·  连接池: 46/50 可用'},
    {delay:2550, type:'info',    text:'提交查询到执行引擎...'},
    {delay:2780, type:'data',    text:'命中索引 idx_date_status  ·  扫描 142,831 行  ·  过滤后 30 行'},
    {delay:2980, type:'data',    text:'返回 30行 × 4列  ·  体积: 3.1 KB  ·  查询耗时: 0.63s'},
    {delay:3100, type:'info',    text:'推断最优可视化方案...'},
    {delay:3280, type:'success', text:'推荐: 折线图 (时序连续趋势)  ·  置信度: 97%'},
    {delay:3450, type:'info',    text:'调用 AI 生成分析洞察...'},
    {delay:3700, type:'success', text:'洞察生成完成  ·  耗时: 0.41s'},

  const doQuery=useCallback((q=input)=>{
    if(!q.trim())return;
    setInput(q);setState('running');setLogs([]);setResult(null);setTab('chart');
    buildSteps(q).forEach(({delay,type,text})=>{
      setTimeout(()=>{
        setLogs(ls=>[...ls,{time:ts(),type,text}]);
      },delay);
    });
    setTimeout(()=>{setState('done');setResult({...MOCK,query:q});},4100);
  },[input]);

  useEffect(()=>{
    if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;
  },[logs]);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* ── Search bar ── */}
      <div style={{padding:'18px 24px 0',flexShrink:0}}>
        <div style={{
          display:'flex',alignItems:'center',gap:12,
          background:C.s2,border:`1px solid ${C.bh}`,borderRadius:14,

            <option>GPT-4o</option><option>Claude 3.5</option><option>DeepSeek-V3</option>

          <button onClick={()=>doQuery()} style={{
            background:state==='running'?C.s3:C.acc,border:'none',borderRadius:9,
            width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',
            cursor:state==='running'?'not-allowed':'pointer',
            boxShadow:state==='running'?'none':`0 0 20px ${C.accG}`,flexShrink:0,
            transition:'all 0.2s',

            {state==='running'
              ?<div style={{width:14,height:14,borderRadius:'50%',border:`2px solid ${C.t3}`,borderTopColor:'transparent',animation:'spin 0.8s linear infinite'}}/>

          </button>
        </div>
        {state==='idle'&&(
          <div style={{display:'flex',gap:7,marginTop:11,flexWrap:'wrap'}}>
            {SAMPLES.map(q=>(
              <button key={q} onClick={()=>doQuery(q)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:20,color:C.t2,fontSize:11,padding:'5px 12px',cursor:'pointer',transition:'all 0.15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=C.acc;e.currentTarget.style.color=C.accL;}}

      {/* ── Body ── */}

// mini log runner for expanded run
const CaseRunLog=({query,onDone})=>{
  const[lines,setLines]=useState([]);
  const logRef=useRef();
  const ts=()=>new Date().toTimeString().slice(0,8);
  useEffect(()=>{
    const steps=[
      {delay:80,  type:'info',   text:`解析查询意图: "${query.slice(0,30)}${query.length>30?'...':''}"`},
      {delay:400, type:'success',text:'意图识别完成'},
      {delay:650, type:'info',   text:'生成 SQL...'},
      {delay:1200,type:'sql',    text:INIT_CASES.find(c=>c.query===query)?.sql||'SELECT ...'},
      {delay:1800,type:'success',text:'SQL 生成完成'},
      {delay:2000,type:'info',   text:'执行查询引擎...'},
      {delay:2500,type:'data',   text:'返回结果集'},
      {delay:2700,type:'success',text:'评测完成'},
    ];
    steps.forEach(({delay,type,text})=>{
      setTimeout(()=>setLines(ls=>[...ls,{time:ts(),type,text}]),delay);
    });
    setTimeout(()=>onDone&&onDone(),2900);
  },[]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[lines]);
  return(
    <div ref={logRef} style={{background:'#02070F',borderRadius:8,padding:'10px 12px',maxHeight:160,overflowY:'auto',border:`1px solid ${C.border}`,marginTop:10}}>
      {lines.map((e,i)=><LogLine key={i} entry={e}/>)}
      {lines.length===0&&<span style={{fontFamily:'monospace',fontSize:11,color:C.t3,animation:'pulse 1s ease infinite'}}>█</span>}
    </div>
  );
};

                            {dim:'意图理解',score:c.score?Math.min(100,c.score+3):null},
                            {dim:'SQL 准确性',score:c.score?Math.max(0,c.score-6):null},
                            {dim:'结果相关性',score:c.score?Math.min(100,c.score+2):null},
                            {dim:'响应效率',score:c.latency?Math.max(55,100-Math.round(parseFloat(c.latency)*12)):null},
                          ].map(({dim,score})=>(
                            <div key={dim} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                              <span style={{fontSize:11,color:C.t2,width:82,flexShrink:0}}>{dim}</span>
                              {score!=null?<ScoreBar score={score}/>:<span style={{fontSize:11,color:C.t3}}>—</span>}
                            </div>
                          ))}
                        </div>
                        <div style={{background:C.s2,borderRadius:8,padding:'10px 12px',flex:1}}>
                          <div style={{fontSize:10,color:C.t3,marginBottom:5,fontWeight:600,letterSpacing:'0.04em'}}>评测备注</div>
                          <div style={{fontSize:12,color:C.t2,lineHeight:1.7}}>{c.notes||'暂无备注'}</div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
};
