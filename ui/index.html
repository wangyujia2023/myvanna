<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vanna Skill — 智能问数管理台</title>
<link rel="stylesheet" href="/ui/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
<header class="header">
  <a class="logo" href="#" onclick="showPage('query');return false;">
    <div class="logo-icon">🧠</div>
    <span>Vanna Skill</span>
  </a>
  <span style="color:var(--text3);font-size:12px" id="db-info">retail_dw @ 10.26.20.3</span>

  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('query')" id="nav-query">🔍 问数验证</button>
    <button class="nav-btn" onclick="showPage('manage')" id="nav-manage">⚙️ 训练管理</button>
    <button class="nav-btn" onclick="showPage('log')" id="nav-log">📋 调用日志</button>
    <button class="nav-btn" onclick="showPage('config')" id="nav-config">🔧 配置</button>
  </nav>
  <div class="header-tools">
    <div class="engine-switch" title="问数引擎">
      <button class="engine-chip" id="engine-vanna" onclick="setAskEngine('vanna')">Vanna</button>
      <button class="engine-chip" id="engine-langchain" onclick="setAskEngine('langchain')">LangChain</button>
      <button class="engine-chip active" id="engine-semantic" onclick="setAskEngine('semantic')" title="语义路径（Semantic Layer）">Semantic</button>
    </div>
    <div class="status-dot" id="status-dot" title="连接状态"></div>
  </div>
</header>

<main class="main">
  <div id="page-container" style="display:flex;flex:1;min-height:0"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script src="/ui/app.js"></script>
</body>
</html>
